# Netlify config for TestRestaurant (preview / test deploys).
# Production stays on Vercel (API + serverless). Use Netlify for manual previews before pushing to git.

[build]
  command    = "pnpm run build:client"
  publish    = "dist/public"
  base       = "."

[build.environment]
  NODE_VERSION = "20"

# SPA: all routes serve index.html (client/public/_redirects is copied into publish dir)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
